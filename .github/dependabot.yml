# Weekly dependency updates for the uv project.
# Scoped to dev dependencies only: `dependency-type: development` covers the
# PEP 735 [dependency-groups] (lint / examples / test / docs) and excludes
# [project.dependencies] (fastapi, typing-extensions), whose lower bounds are
# intentional for library compatibility and must not be bumped automatically.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "development"
    versioning-strategy: increase
    # Collapse all the dev-dependency bumps into a single weekly PR.
    groups:
      dev-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
